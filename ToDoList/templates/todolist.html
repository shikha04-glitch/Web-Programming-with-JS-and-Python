<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic To-Do List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='todolist.css') }}">
</head>
<body>

    <div class="container">
        <h1>📝 Dynamic To-Do List</h1>
        <p class="description">
            This application allows users to add, edit, delete, and track task completion dynamically.
        </p>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter a new task...">
            <button id="addBtn">Add Task</button>
        </div>

        <ul id="taskList"></ul>

        <div class="task-stats">
            <p>Total Tasks: <span id="totalCount">0</span></p>
            <p>Completed: <span id="completedCount">0</span></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='todolist.js') }}"></script>
</body>
</html>
